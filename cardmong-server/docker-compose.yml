version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cardmong-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: cardmong
      MYSQL_USER: cardmong
      MYSQL_PASSWORD: cardmong1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2-alpine
    container_name: cardmong-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
