spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cardmong?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:cardmong}
    password: ${DB_PASSWORD:cardmong}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

jwt:
  secret: ${JWT_SECRET:cardmong-secret-key-for-development-only-change-in-production}
  access-expiration: 3600
  refresh-expiration: 2592000

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
